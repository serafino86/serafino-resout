<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assistant — Serafino Résout</title>
  <style>
    :root {
      --bg:           #f5f1ea;
      --surface:      #fffdf8;
      --surface2:     #ede6db;
      --text:         #1f1a16;
      --muted:        #665d54;
      --accent:       #2d5a4d;
      --accent-hover: #1e3d35;
      --line:         rgba(45, 39, 32, 0.12);
      --line-strong:  rgba(45, 39, 32, 0.22);
      --sans: "Avenir Next", "Segoe UI", "Helvetica Neue", sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
    }

    .bot-page {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .bot-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 18px;
      height: 58px;
      background: var(--surface);
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
    }

    .bot-header-left { display: flex; align-items: center; gap: 10px; }

    .bot-logo {
      width: 34px;
      height: 34px;
      background: var(--accent);
      color: #fff;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .bot-header-name {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text);
      line-height: 1;
    }

    .bot-header-status {
      font-size: 11px;
      color: var(--accent);
      margin-top: 3px;
    }

    .lang-pills { display: flex; gap: 3px; }

    .lang-pill {
      background: transparent;
      border: 1px solid var(--line);
      border-radius: 99px;
      padding: 3px 8px;
      font-size: 13px;
      cursor: pointer;
      opacity: 0.38;
      transition: opacity 0.15s, background 0.15s, border-color 0.15s;
      font-family: inherit;
      line-height: 1;
    }

    .lang-pill.active {
      opacity: 1;
      background: rgba(45, 90, 77, 0.1);
      border-color: var(--accent);
    }

    .lang-pill:hover { opacity: 0.75; }

    /* Thread */
    .bot-thread-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 18px 0 8px;
      display: flex;
      flex-direction: column;
      scroll-behavior: smooth;
      background: var(--bg);
    }

    .bot-bubble-row { display: flex; padding: 3px 16px; }
    .bot-bubble-row.bot  { justify-content: flex-start; }
    .bot-bubble-row.user { justify-content: flex-end; }

    .bot-bubble {
      max-width: min(78%, 560px);
      padding: 10px 14px;
      font-size: 13.5px;
      line-height: 1.62;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .bot-bubble-row.bot .bot-bubble {
      background: var(--surface);
      color: var(--text);
      border-radius: 16px 16px 16px 4px;
      border: 1px solid var(--line);
    }

    .bot-bubble-row.user .bot-bubble {
      background: var(--accent);
      color: #fff;
      border-radius: 16px 16px 4px 16px;
    }

    .bot-typing .bot-bubble {
      padding: 12px 16px;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      animation: bounce 1.2s infinite;
    }

    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%           { transform: translateY(-5px); }
    }

    /* Composer */
    .bot-composer-wrap {
      border-top: 1px solid var(--line);
      background: var(--surface);
      padding: 10px 14px 14px;
      flex-shrink: 0;
    }

    .bot-suggestions {
      display: flex;
      flex-wrap: nowrap;
      overflow-x: auto;
      gap: 5px;
      margin-bottom: 8px;
      scrollbar-width: none;
    }

    .bot-suggestions:empty { margin-bottom: 0; }
    .bot-suggestions::-webkit-scrollbar { display: none; }

    .bot-actions {
      display: none;
      gap: 6px;
      margin-bottom: 8px;
    }

    .bot-actions.is-visible {
      display: flex;
    }

    .bot-suggestion-chip {
      background: transparent;
      border: 1px solid var(--line-strong);
      color: var(--muted);
      border-radius: 99px;
      padding: 5px 11px;
      font-size: 11.5px;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    .bot-suggestion-chip:hover {
      background: rgba(45, 90, 77, 0.08);
      border-color: var(--accent);
      color: var(--text);
    }

    .bot-action-chip {
      background: rgba(45, 90, 77, 0.1);
      border: 1px solid rgba(45, 90, 77, 0.34);
      color: var(--accent);
      border-radius: 99px;
      padding: 7px 12px;
      font-size: 12px;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    .bot-action-chip:disabled {
      opacity: 0.45;
      cursor: default;
    }

    .bot-mail-card {
      display: grid;
      gap: 9px;
    }

    .bot-mail-card p {
      margin: 0;
    }

    .bot-mail-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      width: fit-content;
      padding: 0 14px;
      border-radius: 99px;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      text-decoration: none;
    }

    .bot-composer { display: flex; align-items: flex-end; gap: 8px; }

    .bot-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--line-strong);
      border-radius: 20px;
      color: var(--text);
      font-size: 13.5px;
      font-family: inherit;
      padding: 9px 15px;
      resize: none;
      max-height: 110px;
      min-height: 40px;
      line-height: 1.4;
      transition: border-color 0.15s;
      overflow-y: auto;
    }

    .bot-input:focus { outline: none; border-color: var(--accent); }
    .bot-input::placeholder { color: var(--muted); opacity: 0.7; }

    .bot-send {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, opacity 0.15s;
    }

    .bot-send:disabled { opacity: 0.3; cursor: default; }
    .bot-send:not(:disabled):hover { background: var(--accent-hover); }
    .bot-send svg { width: 18px; height: 18px; }

    @media (max-width: 560px) {
      .bot-header { padding: 0 12px; height: 52px; }
      .bot-header-status { display: none; }
      .lang-pill { padding: 2px 6px; font-size: 12px; }
      .bot-bubble-row { padding: 3px 10px; }
      .bot-bubble { max-width: 88%; }
      .bot-composer-wrap {
        padding: 8px 10px;
        padding-bottom: max(10px, env(safe-area-inset-bottom));
      }
      .bot-input { font-size: 16px; }
    }
  </style>
</head>
<body>
<div class="bot-page">

  <header class="bot-header">
    <div class="bot-header-left">
      <div class="bot-logo">S</div>
      <div>
        <div class="bot-header-name">Serafino Résout</div>
        <div class="bot-header-status">● Assistant en ligne</div>
      </div>
    </div>
    <div class="lang-pills" id="langPills">
      <button class="lang-pill active" data-lang="fr"    title="Français">🇫🇷</button>
      <button class="lang-pill"        data-lang="en"    title="English">🇬🇧</button>
      <button class="lang-pill"        data-lang="it"    title="Italiano">🇮🇹</button>
      <button class="lang-pill"        data-lang="de-CH" title="Deutsch (CH)">🇨🇭</button>
    </div>
  </header>

  <div class="bot-thread-wrap" id="botThread"></div>

  <div class="bot-composer-wrap">
    <div class="bot-actions" id="botActions">
      <button type="button" class="bot-action-chip" id="prepareMail">
        Préparer une mail
      </button>
    </div>
    <div class="bot-suggestions" id="botSuggestions"></div>
    <div class="bot-composer">
      <textarea id="botInput" class="bot-input" rows="1"
        placeholder="Décris ton problème ou pose une question..."></textarea>
      <button type="button" id="botSend" class="bot-send" disabled>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>

</div>
<script>
// ── API ───────────────────────────────────────────────────────────────────────
const API = {
  chatBot: async (payload) => {
    let res;
    try {
      res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
    } catch (networkErr) {
      throw new Error('Erreur réseau : ' + networkErr.message);
    }
    let data;
    try { data = await res.json(); } catch { throw new Error('Réponse invalide du serveur'); }
    if (data.error && !data.reply) throw new Error(data.error);
    return data;
  },
};

// ── State & copy ──────────────────────────────────────────────────────────────
const botState = {
  language: 'fr',
  loading: false,
  messages: [],
  memory: '',
  suggestionsSent: false,
};

const BOT_COPY = {
  fr: {
    welcome: "Bonjour. Je suis l'assistant de Serafino Résout. Je peux t'aider à comprendre si l'offre de Serafino correspond à ta situation — de façon claire et concrète. Commence par me parler de ton activité ou pose une question directe.",
    placeholder: 'Décris ton problème ou pose une question...',
    prepareMail: 'Préparer une mail',
    preparingMail: 'Je prépare la mail...',
    mailIntro: 'J’ai préparé une mail pour Serafino avec ce qui est déjà clair.',
    missingIntro: 'À compléter si tu veux:',
    openMail: 'Ouvrir la mail',
    mailError: 'Je n’ai pas réussi à préparer la mail. Tu peux écrire directement à contact@serafino-resout.ch.',
    suggestions: [
      "C'est quoi Serafino Résout ?",
      'Comment fonctionne le diagnostic gratuit ?',
      'Je perds du temps sur des tâches répétitives',
      'Je veux un CRM simple pour mon équipe',
      'Combien ça coûte ?',
      "J'ai un restaurant, comment tu peux m'aider ?",
    ],
  },
  en: {
    welcome: "Hello. I'm the Serafino Résout assistant. I can help you understand whether Serafino's offer fits your situation — clearly and concretely. Tell me about your activity or ask a direct question.",
    placeholder: 'Describe your problem or ask a question...',
    prepareMail: 'Prepare an email',
    preparingMail: 'I am preparing the email...',
    mailIntro: 'I prepared an email for Serafino with what is already clear.',
    missingIntro: 'To complete if you want:',
    openMail: 'Open email',
    mailError: 'I could not prepare the email. You can write directly to contact@serafino-resout.ch.',
    suggestions: [
      'What is Serafino Résout?',
      'How does the free diagnostic work?',
      'I waste time on repetitive tasks',
      'I need a simple CRM for my team',
      'What does it cost?',
      'I run a restaurant — how can you help?',
    ],
  },
  it: {
    welcome: "Ciao. Sono l'assistente di Serafino Résout. Posso aiutarti a capire se l'offerta di Serafino fa al caso tuo — in modo chiaro e concreto. Raccontami della tua attività o fai una domanda diretta.",
    placeholder: 'Descrivi il tuo problema o fai una domanda...',
    prepareMail: 'Preparare una mail',
    preparingMail: 'Preparo la mail...',
    mailIntro: 'Ho preparato una mail per Serafino con ciò che è già chiaro.',
    missingIntro: 'Da completare se vuoi:',
    openMail: 'Aprire la mail',
    mailError: 'Non sono riuscito a preparare la mail. Puoi scrivere direttamente a contact@serafino-resout.ch.',
    suggestions: [
      "Cos'è Serafino Résout?",
      'Come funziona la diagnosi gratuita?',
      'Perdo tempo in attività ripetitive',
      'Voglio un CRM semplice per il mio team',
      'Quanto costa?',
      'Ho un ristorante — come puoi aiutarmi?',
    ],
  },
  'de-CH': {
    welcome: 'Hallo. Ich bin der Assistent von Serafino Résout. Ich kann dir helfen zu verstehen, ob Serafinos Angebot zu deiner Situation passt — klar und konkret. Erzähl mir von deiner Tätigkeit oder stelle eine direkte Frage.',
    placeholder: 'Beschreibe dein Problem oder stelle eine Frage...',
    prepareMail: 'E-Mail vorbereiten',
    preparingMail: 'Ich bereite die E-Mail vor...',
    mailIntro: 'Ich habe eine E-Mail für Serafino vorbereitet, mit dem, was schon klar ist.',
    missingIntro: 'Kannst du bei Bedarf ergänzen:',
    openMail: 'E-Mail öffnen',
    mailError: 'Ich konnte die E-Mail nicht vorbereiten. Du kannst direkt an contact@serafino-resout.ch schreiben.',
    suggestions: [
      'Was ist Serafino Résout?',
      'Wie funktioniert die kostenlose Diagnose?',
      'Ich verliere Zeit mit wiederkehrenden Aufgaben',
      'Ich brauche ein einfaches CRM für mein Team',
      'Was kostet das?',
      'Ich habe ein Restaurant — wie kannst du mir helfen?',
    ],
  },
};

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function autoResize() {
  const el = document.getElementById('botInput');
  if (!el) return;
  el.style.height = 'auto';
  el.style.height = Math.max(40, Math.min(el.scrollHeight, 110)) + 'px';
}

function syncComposer() {
  const input = document.getElementById('botInput');
  const send  = document.getElementById('botSend');
  const action = document.getElementById('prepareMail');
  if (!input || !send) return;
  const copy = BOT_COPY[botState.language];
  input.placeholder = copy ? copy.placeholder : '';
  input.disabled    = botState.loading;
  send.disabled     = botState.loading || !input.value.trim();
  if (action && copy) {
    action.textContent = botState.loading ? copy.preparingMail : copy.prepareMail;
    action.disabled = botState.loading;
  }
}

function renderActions() {
  const el = document.getElementById('botActions');
  if (!el) return;
  const hasUserMessage = botState.messages.some((msg) => msg.role === 'user');
  el.classList.toggle('is-visible', hasUserMessage);
}

function renderSuggestions() {
  const el = document.getElementById('botSuggestions');
  if (!el) return;
  if (botState.suggestionsSent) { el.innerHTML = ''; return; }
  const copy = BOT_COPY[botState.language];
  el.innerHTML = (copy ? copy.suggestions : []).map(q =>
    '<button type="button" class="bot-suggestion-chip" data-q="' + esc(q) + '">' + esc(q) + '</button>'
  ).join('');
  el.onclick = (e) => {
    const btn = e.target.closest('[data-q]');
    if (btn) send(btn.getAttribute('data-q'));
  };
}

function addBubble(role, text) {
  const thread = document.getElementById('botThread');
  if (!thread) return;
  const row = document.createElement('div');
  row.className = 'bot-bubble-row ' + role;
  const bubble = document.createElement('div');
  bubble.className = 'bot-bubble';
  bubble.textContent = text;
  row.appendChild(bubble);
  thread.appendChild(row);
  thread.scrollTop = thread.scrollHeight;
}

function makeMailto(draft) {
  const to = draft.to || 'contact@serafino-resout.ch';
  const subject = encodeURIComponent(draft.subject || 'Premier échange - Serafino Résout');
  const body = encodeURIComponent(draft.body || '');
  return `mailto:${to}?subject=${subject}&body=${body}`;
}

function addMailDraft(draft) {
  const thread = document.getElementById('botThread');
  const copy = BOT_COPY[botState.language] || BOT_COPY.fr;
  if (!thread) return;

  const missing = Array.isArray(draft.missing) && draft.missing.length
    ? `<p><strong>${esc(copy.missingIntro)}</strong> ${esc(draft.missing.join(', '))}</p>`
    : '';

  const row = document.createElement('div');
  row.className = 'bot-bubble-row bot';
  row.innerHTML = `
    <div class="bot-bubble bot-mail-card">
      <p>${esc(copy.mailIntro)}</p>
      ${missing}
      <p><strong>${esc(draft.subject || '')}</strong></p>
      <a class="bot-mail-button" href="${esc(makeMailto(draft))}" target="_top">${esc(copy.openMail)}</a>
    </div>
  `;
  thread.appendChild(row);
  thread.scrollTop = thread.scrollHeight;
}

function showTyping() {
  const thread = document.getElementById('botThread');
  if (!thread) return;
  const row = document.createElement('div');
  row.className = 'bot-bubble-row bot bot-typing';
  row.id = 'botTyping';
  row.innerHTML = '<div class="bot-bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';
  thread.appendChild(row);
  thread.scrollTop = thread.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('botTyping');
  if (el) el.remove();
}

function setLanguage(lang) {
  if (!BOT_COPY[lang]) return;
  botState.language = lang;
  botState.messages = [{ role: 'bot', text: BOT_COPY[lang].welcome }];
  botState.suggestionsSent = false;
  const thread = document.getElementById('botThread');
  if (thread) {
    thread.innerHTML = '';
    addBubble('bot', BOT_COPY[lang].welcome);
  }
  renderSuggestions();
  renderActions();
  syncComposer();
}

// ── Send message ──────────────────────────────────────────────────────────────
async function send(rawMsg) {
  const msg = String(rawMsg || '').trim();
  if (!msg || botState.loading) return;

  const input = document.getElementById('botInput');
  botState.messages.push({ role: 'user', text: msg });
  botState.suggestionsSent = true;
  if (input) { input.value = ''; autoResize(); }
  botState.loading = true;

  addBubble('user', msg);
  renderSuggestions();
  renderActions();
  syncComposer();
  showTyping();

  try {
    const data = await API.chatBot({
      message: msg,
      messages: botState.messages,
      language: botState.language,
      memory: botState.memory,
    });
    const reply = String(data.reply || 'Pas de réponse disponible.');
    if (typeof data.memory === 'string') botState.memory = data.memory.trim();
    botState.messages.push({ role: 'bot', text: reply });
    hideTyping();
    addBubble('bot', reply);
  } catch (err) {
    const errText = String(err.message || 'Erreur de connexion.');
    botState.messages.push({ role: 'bot', text: errText });
    hideTyping();
    addBubble('bot', errText);
  } finally {
    botState.loading = false;
    syncComposer();
  }
}

async function prepareMail() {
  if (botState.loading) return;
  const copy = BOT_COPY[botState.language] || BOT_COPY.fr;
  botState.loading = true;
  renderActions();
  syncComposer();
  showTyping();

  try {
    const data = await API.chatBot({
      action: 'prepare_email',
      messages: botState.messages,
      language: botState.language,
      memory: botState.memory,
    });
    hideTyping();
    if (!data.draft) throw new Error('Missing draft');
    addMailDraft(data.draft);
  } catch (_) {
    hideTyping();
    addBubble('bot', copy.mailError);
  } finally {
    botState.loading = false;
    syncComposer();
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  addBubble('bot', BOT_COPY.fr.welcome);
  renderSuggestions();
  renderActions();
  syncComposer();

  // Language pills
  document.querySelectorAll('[data-lang]').forEach((btn) => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-lang]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      setLanguage(btn.getAttribute('data-lang'));
    });
  });

  // Input
  const input = document.getElementById('botInput');
  if (input) {
    input.addEventListener('input', () => { autoResize(); syncComposer(); });
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send(input.value);
      }
    });
  }

  // Send button
  const sendBtn = document.getElementById('botSend');
  if (sendBtn) {
    sendBtn.addEventListener('click', () => {
      const input = document.getElementById('botInput');
      send(input ? input.value : '');
    });
  }

  const prepareMailBtn = document.getElementById('prepareMail');
  if (prepareMailBtn) {
    prepareMailBtn.addEventListener('click', prepareMail);
  }

  // Mobile viewport sync (keyboard)
  if (window.visualViewport) {
    const page = document.querySelector('.bot-page');
    const sync = () => {
      if (!page) return;
      page.style.height = window.visualViewport.height + 'px';
    };
    window.visualViewport.addEventListener('resize', sync);
    sync();
  }
});
</script>
</body>
</html>
